name: AI 뉴스 콘텐츠 에이전트

on:
  schedule:
    - cron: '0 23 * * 0,2,4'   # 월·수·금 KST 08:00 (UTC 일·화·목 23:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: pip install -r requirements.txt pytest

      - name: 테스트
        run: python -m pytest tests/ -q

      - name: 파이프라인 실행
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_BCC: ${{ secrets.EMAIL_BCC }}
          EMAIL_ENABLED: "true"
        run: python main.py

      - name: 산출물 중단 감지
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/healthcheck.py --check-stale --max-age-days 8

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch .github/.heartbeat
          git add .github/.heartbeat trends/seen_urls.json trends/issue_count.txt output/ || true
          git diff --staged --quiet || git commit -m "feat: AI 뉴스 $(date +%Y-%m-%d) 자동 생성"
          git push

      - name: 실패 알림
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/healthcheck.py --notify-failure
